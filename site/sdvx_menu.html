<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SDVX Web App - MENU</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Inter:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/sdvx_theme.css">

  <style>
    /* ━━━ CSS変数 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    :root{
      --bg0:#05060a; --bg1:#0a0d16;
      --card:rgba(255,255,255,.07); --card2:rgba(255,255,255,.11);
      --text:#e9ecff; --muted:rgba(233,236,255,.74); --line:rgba(233,236,255,.16);
      --cyan:#28f0ff; --violet:#b35cff; --pink:#ff3bd4;
      --lime:#76ff7a; --amber:#ffcf5a;
      --shadow:0 18px 55px rgba(0,0,0,.55);
      --shadow2:0 10px 30px rgba(0,0,0,.40);
      --blur:16px; --radius:18px;
      --focus:0 0 0 3px rgba(40,240,255,.30),0 0 0 1px rgba(40,240,255,.55) inset;
      --tap:44px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0; color:var(--text);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",sans-serif;
      background:
        radial-gradient(1200px 700px at 14% 10%,rgba(40,240,255,.18),transparent 55%),
        radial-gradient(900px 600px at 82% 18%,rgba(179,92,255,.18),transparent 55%),
        radial-gradient(900px 700px at 72% 88%,rgba(255,59,212,.14),transparent 60%),
        linear-gradient(180deg,var(--bg0),var(--bg1));
      overflow-x:hidden;
    }

    /* ━━━ 背景アニメ ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .bgfx{ position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:-2; }
    .blob{
      position:absolute;width:min(520px,70vw);aspect-ratio:1/1;
      border-radius:50%;filter:blur(40px);opacity:.28;
      mix-blend-mode:screen;transform:translate3d(0,0,0);
      animation:drift 16s ease-in-out infinite;
    }
    .blob.cyan{  background:radial-gradient(circle at 30% 30%,rgba(40,240,255,.9),transparent 62%); left:-10%;  top:-12%;    animation-delay:-2s;}
    .blob.violet{background:radial-gradient(circle at 30% 30%,rgba(179,92,255,.9),transparent 62%); right:-14%; top:-6%;     animation-delay:-7s;}
    .blob.pink{  background:radial-gradient(circle at 30% 30%,rgba(255,59,212,.9),transparent 62%); left:20%;   bottom:-18%; animation-delay:-11s;}
    @keyframes drift{ 0%,100%{transform:translate3d(0,0,0) scale(1);} 50%{transform:translate3d(24px,-18px,0) scale(1.06);} }
    body::before{
      content:"";position:fixed;inset:0;pointer-events:none;
      background:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),
                 linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);
      background-size:46px 46px;opacity:.08;
      mask-image:radial-gradient(900px 560px at 50% 12%,rgba(0,0,0,1),transparent 70%);
      z-index:-1;
    }
    @media(prefers-reduced-motion:no-preference){
      body::before{ animation:gridmove 18s linear infinite; }
      @keyframes gridmove{ 0%{background-position:0 0,0 0;} 100%{background-position:120px 80px,120px 80px;} }
    }

    /* ━━━ レイアウト ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    a{ color:inherit; }
    .wrap{
      max-width:1200px; margin:0 auto;
      padding:max(18px,env(safe-area-inset-top)) 16px max(28px,env(safe-area-inset-bottom));
    }
    header{
      display:flex;gap:14px;align-items:flex-end;
      justify-content:space-between;flex-wrap:wrap;margin-bottom:12px;
    }
    .brand{ display:flex;align-items:baseline;gap:12px;flex-wrap:wrap; }
    .title{
      font-family:Orbitron,Inter,system-ui;letter-spacing:.06em;font-size:28px;
      margin:0;line-height:1.1;text-transform:uppercase;
      background:linear-gradient(90deg,var(--cyan),var(--violet),var(--pink));
      -webkit-background-clip:text;background-clip:text;color:transparent;
      text-shadow:0 0 24px rgba(40,240,255,.16);
    }
    .subtitle{ margin:0;color:var(--muted);font-size:13px;letter-spacing:.03em; }
    .topActions{
      display:flex;gap:10px;flex-wrap:wrap;
      align-items:center;justify-content:flex-end;
    }
    .btn{
      border:1px solid rgba(233,236,255,.18);
      background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04));
      color:var(--text);border-radius:14px;padding:10px 12px;font-size:13px;cursor:pointer;
      transition:transform .08s ease,border-color .15s ease,background .15s ease;
      display:inline-flex;align-items:center;gap:10px;justify-content:center;
      text-decoration:none;min-height:var(--tap);-webkit-tap-highlight-color:transparent;
    }
    .btn:hover{ transform:translateY(-1px);border-color:rgba(179,92,255,.55); }
    .btn:focus-visible{ outline:none;box-shadow:var(--focus); }

    /* ━━━ ハンバーガーボタン ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .hamburger-btn{
      border:1px solid rgba(40,240,255,.35);
      background:rgba(40,240,255,.08);
      color:var(--cyan);
      border-radius:14px;padding:10px 12px;
      cursor:pointer;min-height:var(--tap);
      display:inline-flex;align-items:center;gap:8px;
      font-size:13px;font-family:inherit;
      transition:transform .08s ease,border-color .15s ease,background .15s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .hamburger-btn:hover{ transform:translateY(-1px);border-color:rgba(40,240,255,.6);background:rgba(40,240,255,.14); }
    .hamburger-btn:focus-visible{ outline:none;box-shadow:var(--focus); }
    .hamburger-icon{ display:flex;flex-direction:column;gap:4px;width:18px; }
    .hamburger-icon span{
      display:block;height:2px;border-radius:2px;
      background:currentColor;transition:transform .2s,opacity .2s;
    }

    /* ━━━ サイドメニューオーバーレイ ━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .side-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.55);
      z-index:1000;opacity:0;pointer-events:none;
      transition:opacity .25s ease;backdrop-filter:blur(4px);
    }
    .side-overlay.active{ opacity:1;pointer-events:all; }

    .side-panel{
      position:fixed;top:0;right:0;bottom:0;
      width:min(420px,92vw);
      background:linear-gradient(160deg,rgba(10,14,26,.97),rgba(20,14,35,.97));
      border-left:1px solid rgba(40,240,255,.18);
      z-index:1001;
      transform:translateX(100%);
      transition:transform .28s cubic-bezier(.4,0,.2,1);
      display:flex;flex-direction:column;
      overflow:hidden;
    }
    .side-panel.active{ transform:translateX(0); }

    .side-panel-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:16px 18px;
      border-bottom:1px solid rgba(233,236,255,.12);
      flex:0 0 auto;
    }
    .side-panel-title{
      font-family:Orbitron,Inter,system-ui;font-size:14px;
      letter-spacing:.08em;text-transform:uppercase;
      color:var(--cyan);
    }
    .side-close-btn{
      width:36px;height:36px;border-radius:12px;
      border:1px solid rgba(233,236,255,.18);background:rgba(0,0,0,.18);
      color:var(--text);cursor:pointer;display:grid;place-items:center;
      font-size:16px;transition:border-color .15s,transform .08s;
      -webkit-tap-highlight-color:transparent;
    }
    .side-close-btn:hover{ transform:scale(1.08);border-color:rgba(255,59,212,.5); }

    .side-panel-actions{
      display:flex;gap:8px;padding:10px 18px;
      border-bottom:1px solid rgba(233,236,255,.08);flex:0 0 auto;
    }
    .side-panel-actions .btn{ flex:1 1 auto;font-size:12px;padding:8px 10px;min-height:36px; }

    .side-panel-body{
      flex:1 1 auto;overflow-y:auto;padding:12px 14px;
      scrollbar-width:thin;scrollbar-color:rgba(40,240,255,.25) transparent;
    }
    .side-panel-body::-webkit-scrollbar{ width:4px; }
    .side-panel-body::-webkit-scrollbar-thumb{ background:rgba(40,240,255,.25);border-radius:4px; }

    /* ━━━ ローディングバナー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .loading-banner{
      display:none;align-items:center;justify-content:center;gap:12px;
      padding:12px 16px;border-radius:var(--radius);
      border:1px solid rgba(40,240,255,.2);
      background:rgba(40,240,255,.06);
      color:var(--cyan);font-size:13px;margin-bottom:14px;
    }
    .loading-banner.active{ display:flex; }
    .loading-spinner{
      width:16px;height:16px;border-radius:50%;
      border:2px solid rgba(40,240,255,.25);
      border-top-color:var(--cyan);
      animation:spin .8s linear infinite;
    }
    @keyframes spin{ to{ transform:rotate(360deg); } }
    .load-error{
      padding:16px;color:var(--muted);font-size:13px;
      border:1px solid rgba(255,59,212,.2);border-radius:var(--radius);
      background:rgba(255,59,212,.04);
    }

    /* ━━━ プロフィールカード ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #profileSection{ margin-top:10px;margin-bottom:4px; }
    .profile-card{
      background:linear-gradient(135deg,rgba(40,240,255,.06),rgba(179,92,255,.06));
      border:1px solid rgba(40,240,255,.22);border-radius:var(--radius);
      box-shadow:var(--shadow);backdrop-filter:blur(var(--blur));padding:20px 24px;
    }
    .profile-inner{ display:flex;align-items:center;gap:20px;flex-wrap:wrap; }
    .profile-avatar{
      width:52px;height:52px;border-radius:50%;
      border:1.5px solid rgba(40,240,255,.35);background:rgba(40,240,255,.07);
      display:grid;place-items:center;flex:0 0 auto;
      box-shadow:0 0 16px rgba(40,240,255,.18);
    }
    .profile-avatar svg{ width:32px;height:32px; }
    .profile-name-block{ min-width:0; }
    .profile-player-name{
      margin:0;font-family:Orbitron,Inter,system-ui;font-size:22px;font-weight:700;
      letter-spacing:.06em;text-transform:uppercase;
      background:linear-gradient(90deg,var(--cyan),var(--violet));
      -webkit-background-clip:text;background-clip:text;color:transparent;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .profile-player-id{
      margin:4px 0 0;font-size:12px;color:var(--muted);letter-spacing:.04em;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    }
    .profile-stats{ display:flex;align-items:center;gap:24px;flex-wrap:wrap;margin-left:auto; }
    .profile-stat{ display:flex;flex-direction:column;align-items:center;gap:4px; }
    .profile-stat-value{
      font-family:Orbitron,Inter,system-ui;font-size:26px;font-weight:700;
      letter-spacing:.04em;color:var(--text);line-height:1;
    }
    .profile-vf-value{
      background:linear-gradient(90deg,var(--cyan),var(--lime));
      -webkit-background-clip:text;background-clip:text;color:transparent;
      filter:drop-shadow(0 0 8px rgba(40,240,255,.35));
    }
    .profile-stat-label{ font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted); }
    .profile-rank-tag{ margin-top:2px;font-size:10px;letter-spacing:.06em;font-family:Orbitron,Inter,system-ui; }
    .profile-stat-divider{ width:1px;height:48px;background:rgba(233,236,255,.16);flex:0 0 auto; }
    .profile-error{ padding:14px; }
    .profile-error-text{ margin:0;color:var(--muted);font-size:13px; }

    /* ━━━ セクションヘッダー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .section-heading{
      font-family:Orbitron,Inter,system-ui;font-size:13px;letter-spacing:.1em;
      text-transform:uppercase;color:var(--cyan);
      border-left:3px solid var(--cyan);padding-left:10px;
      margin:24px 0 12px;
    }

    /* ━━━ スタッツパネル ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #statsSection{ margin-top:14px; }
    .stats-tabs{
      display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;
    }
    .stats-tab{
      border:1px solid rgba(233,236,255,.18);background:rgba(0,0,0,.18);
      color:rgba(233,236,255,.9);padding:8px 14px;border-radius:999px;
      font-size:12px;cursor:pointer;transition:border-color .15s,background .15s,transform .08s;
      min-height:36px;font-family:Orbitron,Inter,system-ui;letter-spacing:.06em;
      -webkit-tap-highlight-color:transparent;
    }
    .stats-tab:hover{ transform:translateY(-1px);border-color:rgba(40,240,255,.55); }
    .stats-tab.active{
      border-color:rgba(40,240,255,.78);background:rgba(40,240,255,.12);
      box-shadow:0 0 0 1px rgba(40,240,255,.24) inset;color:var(--cyan);
    }
    .stats-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:10px;
    }
    .stat-card{
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
      border:1px solid rgba(233,236,255,.14);border-radius:14px;
      padding:14px 14px 12px;display:flex;flex-direction:column;align-items:center;
      gap:4px;text-align:center;
      transition:transform .12s,border-color .15s;
    }
    .stat-card:hover{ transform:translateY(-2px);border-color:rgba(40,240,255,.3); }
    .stat-card-value{
      font-family:Orbitron,Inter,system-ui;font-size:20px;font-weight:700;
      letter-spacing:.04em;color:var(--text);line-height:1.1;
    }
    .stat-cyan{ color:var(--cyan); }
    .stat-lime{ color:var(--lime); }
    .stat-amber{ color:var(--amber); }
    .stat-violet{ color:var(--violet); }
    .stat-pink{ color:var(--pink); }
    .stat-card-sub{ font-size:11px;color:var(--muted); }
    .stat-card-label{ font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted); }

    /* ━━━ 曲テーブル ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #tableSection{ margin-top:14px; }
    .table-controls{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .table-filter-tabs{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .table-sort-controls{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-left:auto;
    }

    .sort-btn{
      border:1px solid rgba(233,236,255,.16);
      background:rgba(0,0,0,.16);
      color:rgba(233,236,255,.8);
      padding:6px 10px;
      border-radius:10px;
      font-size:12px;
      cursor:pointer;
      transition:border-color .15s,background .15s,transform .08s;
      display:inline-flex;
      align-items:center;
      gap:4px;
      min-height:32px;
      -webkit-tap-highlight-color:transparent;
    }
    .sort-btn:hover{
      transform:translateY(-1px);
      border-color:rgba(40,240,255,.4);
    }
    .sort-btn.active{
      border-color:rgba(40,240,255,.6);
      background:rgba(40,240,255,.08);
      color:var(--cyan);
    }
    .sort-arrow{
      font-size:10px;
      line-height:1;
    }

    .table-meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:10px;
      color:var(--muted);
      font-size:12px;
    }

    .table-meta-left,
    .table-meta-right{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .table-count{
      color:var(--text);
    }

    .page-size-label{
      font-size:12px;
      color:var(--muted);
    }

    .page-size-select{
      min-height:34px;
      padding:6px 10px;
      border-radius:10px;
      border:1px solid rgba(233,236,255,.16);
      background:rgba(0,0,0,.2);
      color:var(--text);
      font-size:12px;
    }

    .song-table-wrap{
      overflow-x:auto;
      border-radius:var(--radius);
      border:1px solid rgba(233,236,255,.12);
      scrollbar-width:thin;
      scrollbar-color:rgba(40,240,255,.2) transparent;
    }

    .song-table-wrap::-webkit-scrollbar{
      height:4px;
      width:4px;
    }
    .song-table-wrap::-webkit-scrollbar-thumb{
      background:rgba(40,240,255,.2);
      border-radius:4px;
    }

    .song-table{
      width:100%;
      border-collapse:collapse;
      font-size:12px;
      white-space:nowrap;
    }

    .song-table thead tr{
      background:rgba(10,14,26,.9);
      border-bottom:1px solid rgba(40,240,255,.2);
    }

    .song-table th{
      padding:10px 10px;
      text-align:left;
      font-family:Orbitron,Inter,system-ui;
      font-size:10px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:600;
    }

    .song-table td{
      padding:8px 10px;
      vertical-align:middle;
    }

    .song-table tbody tr{
      border-bottom:1px solid rgba(233,236,255,.06);
      transition:background .1s;
    }
    .song-table tbody tr:hover{
      background:rgba(40,240,255,.04);
    }

    .table-pagination{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .pager-btn,
    .page-number-btn{
      min-height:36px;
      padding:6px 12px;
      border-radius:10px;
      border:1px solid rgba(233,236,255,.16);
      background:rgba(0,0,0,.16);
      color:rgba(233,236,255,.9);
      font-size:12px;
      cursor:pointer;
      transition:border-color .15s,background .15s,transform .08s;
    }

    .pager-btn:hover:not(:disabled),
    .page-number-btn:hover{
      transform:translateY(-1px);
      border-color:rgba(40,240,255,.4);
    }

    .pager-btn:disabled{
      opacity:.35;
      cursor:default;
    }

    .page-buttons{
      display:flex;
      gap:6px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:center;
    }

    .page-number-btn.active{
      border-color:rgba(40,240,255,.7);
      background:rgba(40,240,255,.12);
      color:var(--cyan);
      box-shadow:0 0 0 1px rgba(40,240,255,.2) inset;
    }

    .page-ellipsis{
      color:var(--muted);
      font-size:12px;
      padding:0 4px;
    }

    .table-page-info{
      margin-top:10px;
      text-align:center;
      font-size:12px;
      color:var(--muted);
    }

    /* ジャケット */
    .jacket-thumb{
      width:44px;height:44px;border-radius:8px;object-fit:cover;
      border:1px solid rgba(233,236,255,.12);display:block;
    }
    .jacket-placeholder{
      width:44px;height:44px;border-radius:8px;
      background:rgba(255,255,255,.05);border:1px solid rgba(233,236,255,.1);
    }

    /* 曲名・難易度 */
    .col-title{ min-width:160px;max-width:260px; }
    .title-line{
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
      max-width:240px;font-size:12px;
    }
    .diff-line{ margin-top:3px; }
    .diff-badge{
      display:inline-block;padding:2px 7px;border-radius:6px;
      font-family:Orbitron,Inter,system-ui;font-size:9px;
      letter-spacing:.06em;font-weight:700;
      border:1px solid currentColor;
    }
    .diff-nov{ color:#8c84ff; } .diff-adv{ color:#fbb649; }
    .diff-exh{ color:#fb494c; } .diff-mxm{ color:#c8c8c8; }
    .diff-inf{ color:#ee65e5; } .diff-grv{ color:#fb8f49; }
    .diff-hvn{ color:#49c9fb; } .diff-vvd{ color:#ff59cd; }
    .diff-xcd{ color:#187fff; } .diff-ult{ color:#ffdd57; }

    /* クリアバッジ */
    .clear-badge{
      display:inline-block;padding:3px 8px;border-radius:6px;
      font-family:Orbitron,Inter,system-ui;font-size:9px;
      letter-spacing:.06em;font-weight:700;
    }
    .clear-per{  background:rgba(241,239,119,.15);color:#f1ef77;border:1px solid rgba(241,239,119,.4); }
    .clear-uc{   background:rgba(248,137,175,.12);color:#f889af;border:1px solid rgba(248,137,175,.4); }
    .clear-mxv{  background:rgba(228,228,228,.10);color:#e4e4e4;border:1px solid rgba(228,228,228,.3); }
    .clear-ex{   background:rgba(176,116,241,.10);color:#b074f1;border:1px solid rgba(176,116,241,.3); }
    .clear-comp{ background:rgba(110,235,175,.10);color:#6eebaf;border:1px solid rgba(110,235,175,.3); }
    .clear-play{ background:rgba(34,82,57,.4);     color:#aaa;    border:1px solid rgba(255,255,255,.1); }
    .clear-no{   background:rgba(255,255,255,.03); color:#666;    border:1px solid rgba(255,255,255,.08); }

    /* スコア */
    .score-per{ color:var(--lime);font-weight:600; }
    .col-lv{ font-family:Orbitron,Inter,system-ui;font-size:13px;font-weight:700;color:var(--text); }

    /* EX差分 */
    .exdiff-over{ color:var(--lime);font-weight:700; }
    .exdiff-close{ color:var(--cyan);font-weight:600; }
    .exdiff-near{ color:var(--amber); }
    .exdiff-far{ color:var(--muted); }

    /* VF */
    .vf-value{
      font-family:Orbitron,Inter,system-ui;font-size:12px;font-weight:700;color:var(--cyan);
    }

    /* ━━━ サイドメニュー内のセクション ━━━━━━━━━━━━━━━━━━━━━━━ */
    .side-panel-body .sections{ display:grid;gap:10px;margin:0; }
    .side-panel-body details.section{
      border-radius:14px;border:1px solid rgba(233,236,255,.14);
      background:linear-gradient(180deg,rgba(0,0,0,.22),rgba(0,0,0,.12));
      overflow:hidden;
    }
    .side-panel-body .grid{
      padding:0 10px 10px;
      grid-template-columns:1fr;gap:8px;
    }
    .side-panel-body .item{ min-height:80px;padding:12px; }
    .side-panel-body .label{ font-size:15px; }

    /* ━━━ タグ ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .tag{
      font-size:11px;padding:4px 8px;border-radius:999px;
      border:1px solid rgba(233,236,255,.16);background:rgba(0,0,0,.16);
      color:rgba(233,236,255,.82);letter-spacing:.02em;white-space:nowrap;
    }
    .tag.cyan{   border-color:rgba(40,240,255,.35);  color:rgba(40,240,255,.92);   background:rgba(40,240,255,.08); }
    .tag.violet{ border-color:rgba(179,92,255,.35);  color:rgba(199,142,255,.95);  background:rgba(179,92,255,.08); }
    .tag.pink{   border-color:rgba(255,59,212,.35);  color:rgba(255,140,231,.95);  background:rgba(255,59,212,.08); }
    .tag.lime{   border-color:rgba(118,255,122,.30); color:rgba(168,255,171,.95);  background:rgba(118,255,122,.08);}
    .tag.amber{  border-color:rgba(255,207,90,.30);  color:rgba(255,224,150,.95);  background:rgba(255,207,90,.08); }

    /* ━━━ アイテムカード（サイドメニュー用） ━━━━━━━━━━━━━━━━━ */
    .item{
      position:relative;padding:14px;overflow:hidden;
      border-radius:var(--radius);border:1px solid rgba(233,236,255,.16);
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
      box-shadow:0 12px 30px rgba(0,0,0,.42);
      transition:transform .12s,border-color .15s;min-height:104px;
    }
    .item:hover{ transform:translateY(-2px);border-color:rgba(40,240,255,.48); }
    .item::before{
      content:"";position:absolute;inset:-2px;opacity:.9;pointer-events:none;
      background:
        radial-gradient(520px 160px at 18% 0%,rgba(40,240,255,.16),transparent 58%),
        radial-gradient(420px 180px at 82% 30%,rgba(179,92,255,.14),transparent 60%),
        radial-gradient(520px 220px at 60% 120%,rgba(255,59,212,.12),transparent 62%);
    }
    .item > *{ position:relative; }
    .topline{ display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px; }
    .nameRow{ display:flex;gap:10px;align-items:center;min-width:0; }
    .thumb{
      width:40px;height:40px;border-radius:14px;
      border:1px solid rgba(233,236,255,.16);background:rgba(0,0,0,.18);
      display:grid;place-items:center;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);flex:0 0 auto;
    }
    .thumb svg{ width:22px;height:22px;opacity:.95; }
    .label{
      font-family:"Bebas Neue",Inter,system-ui;font-size:19px;
      letter-spacing:.08em;margin:0;line-height:1.05;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .meta{ display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end; }
    .linkrow{ display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap; }
    a.launch{
      text-decoration:none;display:inline-flex;gap:10px;align-items:center;
      padding:10px 12px;border-radius:14px;
      border:1px solid rgba(233,236,255,.18);background:rgba(0,0,0,.18);
      color:var(--text);font-weight:600;font-size:13px;
      transition:transform .08s,border-color .15s;min-height:var(--tap);
      -webkit-tap-highlight-color:transparent;
    }
    a.launch:hover{ transform:translateY(-1px);border-color:rgba(255,59,212,.55); }
    a.launch:focus-visible{ outline:none;box-shadow:var(--focus); }
    button.copy{
      border:1px solid rgba(233,236,255,.18);background:rgba(0,0,0,.12);
      color:rgba(233,236,255,.88);border-radius:14px;padding:10px 12px;
      cursor:pointer;font-size:12px;
      transition:border-color .15s,transform .08s;
      min-height:var(--tap);-webkit-tap-highlight-color:transparent;
    }
    button.copy:hover{ transform:translateY(-1px);border-color:rgba(40,240,255,.55); }
    button.copy:focus-visible{ outline:none;box-shadow:var(--focus); }

    /* ━━━ セクション共通 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    details.section{ border-radius:var(--radius);border:1px solid rgba(233,236,255,.16);
      background:linear-gradient(180deg,rgba(0,0,0,.20),rgba(0,0,0,.10));
      box-shadow:var(--shadow2);overflow:hidden; }
    summary.sectionHead{
      list-style:none;cursor:pointer;padding:14px;display:flex;gap:12px;
      align-items:center;justify-content:space-between;
      user-select:none;-webkit-tap-highlight-color:transparent;
    }
    summary.sectionHead::-webkit-details-marker{ display:none; }
    .secLeft{ display:flex;gap:12px;align-items:center;min-width:0; }
    .secIcon{
      width:34px;height:34px;border-radius:12px;
      border:1px solid rgba(233,236,255,.16);background:rgba(0,0,0,.18);
      display:grid;place-items:center;flex:0 0 auto;
    }
    .secIcon svg{ width:18px;height:18px;opacity:.95; }
    .secTitleWrap{ min-width:0; }
    .secTitle{ margin:0;font-family:Orbitron,Inter,system-ui;font-size:14px;letter-spacing:.06em;text-transform:uppercase;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .secDesc{ margin:3px 0 0;font-size:12px;color:rgba(233,236,255,.70);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .secRight{ display:flex;gap:10px;align-items:center;flex:0 0 auto;color:rgba(233,236,255,.78);font-size:12px; }
    .pill{ padding:6px 10px;border-radius:999px;border:1px solid rgba(233,236,255,.16);background:rgba(0,0,0,.16); }
    .chev{ width:28px;height:28px;border-radius:10px;border:1px solid rgba(233,236,255,.16);background:rgba(0,0,0,.14);display:grid;place-items:center;transition:transform .12s; }
    details[open] .chev{ transform:rotate(180deg); }
    .grid{ padding:0 14px 14px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px; }
    @media(max-width:980px){ .grid{grid-template-columns:repeat(2,minmax(0,1fr));} }
    @media(max-width:560px){ .grid{grid-template-columns:1fr;} }

    /* ━━━ ユーティリティ ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    footer{
      margin-top:24px;color:rgba(233,236,255,.65);font-size:12px;
      display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
      padding:10px 2px 0;border-top:1px solid rgba(233,236,255,.08);
    }
    .kbd{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      font-size:11px;padding:2px 6px;border-radius:8px;
      border:1px solid rgba(233,236,255,.18);background:rgba(0,0,0,.18);
      color:rgba(233,236,255,.78);
    }
    .sr-only{ position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }
    @media(prefers-reduced-motion:reduce){ .blob,body::before{ animation:none !important; } *{ scroll-behavior:auto !important; } }

    /* ━━━ レスポンシブ ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @media(max-width:560px){
      .topActions{ width:100%;justify-content:stretch; }
      .topActions .btn,.hamburger-btn{ flex:1 1 auto; }
      a.launch,button.copy{ flex:1 1 160px;justify-content:center; }
      .title{ font-size:26px; }
      .profile-inner{ gap:14px; }
      .profile-stats{ margin-left:0;gap:14px; }
      .profile-player-name{ font-size:18px; }
      .profile-stat-value{ font-size:22px; }
      .stats-grid{ grid-template-columns:repeat(2,1fr); }
      .col-lv,.col-exscore{ display:none; }
    }
  </style>
</head>

<body>
  <!-- 背景 -->
  <div class="bgfx" aria-hidden="true">
    <div class="blob cyan"></div>
    <div class="blob violet"></div>
    <div class="blob pink"></div>
  </div>

  <!-- ━━━ サイドメニュー ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <div id="sideMenuOverlay" class="side-overlay" aria-hidden="true"></div>
  <nav id="sideMenu" class="side-panel" aria-label="ページメニュー" aria-hidden="true">
    <div class="side-panel-header">
      <span class="side-panel-title">SUB MENU</span>
      <button id="sideMenuClose" class="side-close-btn" type="button" aria-label="閉じる">✕</button>
    </div>
    <div class="side-panel-actions">
      <button class="btn" id="sideCollapseAll" type="button">セクション切替</button>
    </div>
    <div class="side-panel-body">
      <div id="sideMenuContent" class="sections" aria-label="ページ一覧"></div>
    </div>
  </nav>

  <!-- ━━━ メインコンテンツ ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <div class="wrap">
    <header>
      <div class="brand">
        <h1 class="title">SDVX MENU</h1>
        <p class="subtitle">MAIN MENU</p>
      </div>

      <div class="topActions">
        <a class="btn" href="#" id="openLast" title="最後に開いたページへ">最後に開いたページ</a>
        <!-- ハンバーガーボタン -->
        <button
          id="hamburgerBtn"
          class="hamburger-btn"
          type="button"
          aria-label="ページメニューを開く"
          aria-expanded="false"
          aria-controls="sideMenu"
        >
          <span class="hamburger-icon" aria-hidden="true">
            <span></span><span></span><span></span>
          </span>
          MENU
        </button>
      </div>
    </header>

    <!-- プロフィール -->
    <section id="profileSection" aria-label="プレイヤープロフィール">
      <!-- profile.js が描画 -->
    </section>

    <!-- ローディングバナー -->
    <div id="loadingBanner" class="loading-banner" role="status" aria-live="polite">
      <div class="loading-spinner" aria-hidden="true"></div>
      データを読み込んでいます...
    </div>

    <!-- 集計スタッツ -->
    <h2 class="section-heading">STATS</h2>
    <section id="statsSection" aria-label="集計スタッツ">
      <!-- stats-panel.js が描画 -->
    </section>

    <!-- 曲一覧テーブル -->
    <h2 class="section-heading">SONG LIST</h2>
    <section id="tableSection" aria-label="曲一覧">
      <!-- song-table.js が描画 -->
    </section>

    <footer>
      <div>SDVX Player Stats • local HTML</div>
    </footer>
  </div>

  <script type="module" src="../js/menu-main.js"></script>
</body>
</html>
