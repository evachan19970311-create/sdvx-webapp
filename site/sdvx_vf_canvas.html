<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SDVX Web App - VF TARGET LIST</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/sdvx_theme.css">

  <style>
    .progress-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .progress-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .progress-content {
      text-align: center;
      color: #00e5ff;
    }
    .progress-bar {
      width: 300px;
      height: 4px;
      background: rgba(0,229,255,0.2);
      border-radius: 2px;
      margin: 20px auto;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00e5ff, #00ff88);
      width: 0%;
      transition: width 0.2s;
    }
  </style>
</head>

<body data-page-type="vf-target">
  <div class="bgfx" aria-hidden="true">
    <div class="blob cyan"></div>
    <div class="blob violet"></div>
    <div class="blob pink"></div>
  </div>

  <div class="progress-overlay" id="progressOverlay">
    <div class="progress-content">
      <h2>Generating Optimized Canvas...</h2>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p id="progressText">Initializing...</p>
    </div>
  </div>

  <div class="wrap">
    <header>
      <div class="brand">
        <h1 class="title"></h1>
        <p class="subtitle"></p>
      </div>

      <div class="topActions">
        <a class="btn" href="sdvx_menu.html" title="メニューへ戻る">メニューへ戻る</a>
        <a class="btn" href="#" id="openLast" title="最後に開いたページへ">最後に開いたページ</a>
      </div>
    </header>

    <section class="panel">
      <div class="card">
        <div class="stage">
          <div class="toolbar" aria-label="操作">
            <div class="left">
              <button id="download" class="btn" type="button">Download PNG</button>
              <button id="toggleFit" class="btn" type="button" aria-pressed="true" title="表示サイズ切替">表示：フィット</button>
              <button id="regenerate" class="btn" type="button" title="再描画">Regenerate</button>
            </div>

          </div>

          <div id="canvasWrap" class="canvasWrap fit" aria-label="キャンバス表示（スクロール可）">
            <canvas id="cv"></canvas>
          </div>

          <div class="hint">
            表示はスクロール／フィット切替のみ。PNG出力はCanvas実寸で行われます（表示倍率の影響なし）。
          </div>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="../js/main.js"></script>
</body>
</html>
